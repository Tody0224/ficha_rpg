{% extends 'base.html' %}
{% block content %}
<div class="header">
    <h1>🧙‍♂️ {% if entity %}EDITAR CONJURADOR{% else %}NOVO CONJURADOR{% endif %}</h1>
    <a href="/" style="color: var(--accent2); text-decoration: none; font-size: 13px;">← Voltar ao Menu</a>
</div>

<form id="sheetForm" action="{% if entity %}/save_and_process/{{ sheet_type }}/{{ entity.id }}{% else %}/save_and_process/{{ sheet_type }}{% endif %}" method="POST">
    
    <input type="hidden" name="action_type" id="action_type" value="pdf">

    <div class="card">
        <h3>IDENTIFICAÇÃO</h3>
        <div class="form-group">
            <label>Nome *</label>
            <input type="text" name="NOME" id="NOME" value="{{ entity.nome if entity else (entity.NOME if entity else '') }}" required>
        </div>
        <div class="grid-3">
            <div class="form-group">
                <label>Idade *</label>
                <input type="number" name="IDADE" id="IDADE" value="{{ entity.idade if entity else (entity.IDADE if entity else '20') }}" required>
            </div>
            <div class="form-group">
                <label>Grau de Ressonância *</label>
                <input type="number" name="GRAU" id="GRAU" value="{{ entity.grau if entity else (entity.GRAU if entity else '1') }}" required onchange="calculateResources()">
            </div>
            <div class="form-group">
                <label>Escola de Combate *</label>
                <select name="ESCOLA" id="ESCOLA" required onchange="document.getElementById('escola_hidden').value = this.value;">
                    <option value="">Selecione...</option>
                    {% for e in constants.ESCOLAS %}
                    <option value="{{ e }}" {% if entity and (entity.escola == e or entity.ESCOLA == e) %}selected{% endif %}>{{ e }}</option>
                    {% endfor %}
                </select>
                <input type="hidden" name="escola" id="escola_hidden" value="{% if entity %}{{ entity.escola if entity.escola else entity.ESCOLA }}{% endif %}">
            </div>
        </div>
    </div>

    <div class="card">
        <h3>DISTRIBUIÇÃO DE ATRIBUTOS</h3>
        <div class="grid-3">
            <div class="form-group"><label>Brutalidade</label><input type="number" class="attr-input" name="BRUTALIDADE" id="BRUTALIDADE" value="{{ entity.brutalidade if entity else (entity.BRUTALIDADE if entity else '1') }}" min="0" max="3"></div>
            <div class="form-group"><label>Rapidez</label><input type="number" class="attr-input" name="RAPIDEZ" id="RAPIDEZ" value="{{ entity.rapidez if entity else (entity.RAPIDEZ if entity else '1') }}" min="0" max="3"></div>
            <div class="form-group"><label>Vitalidade</label><input type="number" class="attr-input" name="VITALIDADE" id="VITALIDADE" value="{{ entity.vitalidade if entity else (entity.VITALIDADE if entity else '1') }}" min="0" max="3" onchange="calculateResources()"></div>
            <div class="form-group"><label>Influência</label><input type="number" class="attr-input" name="INFLUÊNCIA" id="INFLUÊNCIA" value="{{ entity.influencia if entity else (entity.INFLUÊNCIA if entity else '1') }}" min="0" max="3"></div>
            
            <div class="form-group"><label>Sintonia</label><input type="number" class="attr-input" name="SINTONIA_ATRIB" id="SINTONIA" value="{{ entity.sintonia if entity else (entity.SINTONIA_ATRIB if entity else (entity.SINTONIA if entity else '1')) }}" min="0" max="3" onchange="calculateResources()"></div>
            
            <div class="form-group"><label>Astúcia</label><input type="number" class="attr-input" name="ASTÚCIA" id="ASTÚCIA" value="{{ entity.astucia if entity else (entity.ASTÚCIA if entity else '1') }}" min="0" max="3" onchange="updatePericiasCount()"></div>
        </div>
        <div style="margin-top: 15px; background: var(--panel); padding: 10px; border-radius: 4px;">
            <button type="button" class="btn btn-secondary" onclick="calculateResources()">⚄ Calcular Recursos</button>
            <span id="resourceOutput" style="font-weight: bold; color: var(--accent); margin-left: 10px;"></span>
        </div>
    </div>

    <div class="card">
        <h3>PERÍCIAS DISPONÍVEIS <span id="periciasCount" style="font-size: 14px; color: var(--accent2); float: right;"></span></h3>
        <div class="checkbox-group">
            {% for p in constants.PERICIAS_DISP %}
            <div class="checkbox-item">
                <input type="checkbox" name="pericias" value="{{ p }}" id="p_{{ p }}" onchange="validatePericiasLimit(this)"
                {% if entity and (p in entity.pericias or (entity.PERICIAS and p in entity.PERICIAS)) %}checked{% endif %}>
                <label style="margin: 0;" for="p_{{ p }}">{{ p }}</label>
            </div>
            {% endfor %}
        </div>
    </div>

    <div class="card">
        <h3>EXTRAS</h3>
        <div class="form-group"><label>Background / Histórico</label><textarea name="BACKGROUND" id="BACKGROUND" rows="3">{{ entity.historio if entity else (entity.BACKGROUND if entity else '') }}</textarea></div>
        <div class="form-group"><label>Inventário Inicial</label><textarea name="INVENTARIO" id="INVENTARIO" rows="2">{{ entity.inventario if entity else (entity.INVENTARIO if entity else '') }}</textarea></div>
        <div class="form-group"><label>Nome da Relíquia Vinculada</label><input type="text" name="RELIQUIA" id="RELIQUIA" value="{{ entity.reliquia if entity else (entity.RELIQUIA if entity else '') }}"></div>
    </div>

    <div style="display: flex; gap: 10px;">
        <button type="submit" class="btn">📄 Gerar PDF da Conjurador</button>
        <button type="submit" class="btn btn-secondary" onclick="document.getElementById('action_type').value='database'">💾 Salvar no Banco de Dados</button>
        <button type="button" class="btn btn-secondary" onclick="activateTestMode()">🎲 Modo Teste (Preencher Aleatório)</button>
    </div>
</form>

<script>
const BASE_PERICIAS = 4; 

function getPericiasMax() {
    const astuciaInput = document.getElementById('ASTÚCIA');
    const astucia = astuciaInput ? (parseInt(astuciaInput.value) || 0) : 0;
    return BASE_PERICIAS + astucia;
}

function updatePericiasCount() {
    const checkboxes = document.querySelectorAll('input[name="pericias"]');
    const selecionadas = Array.from(checkboxes).filter(cb => cb.checked).length;
    const max = getPericiasMax();
    
    const output = document.getElementById('periciasCount');
    if (output) {
        output.innerText = `Selecionadas: ${selecionadas} / Máximo Permitido: ${max}`;
        output.style.color = selecionadas > max ? "red" : "var(--accent2)";
    }
}

function validatePericiasLimit(element) {
    const checkboxes = document.querySelectorAll('input[name="pericias"]');
    const selecionadas = Array.from(checkboxes).filter(cb => cb.checked).length;
    const max = getPericiasMax();
    
    if (selecionadas > max) {
        alert(`Limite excedido! O seu Conjurador só pode escolher até ${max} perícias.`);
        element.checked = false;
    }
    updatePericiasCount();
}

function calculateResources() {
    const grauInput = document.getElementById('GRAU');
    const vitInput = document.getElementById('VITALIDADE');
    const sintInput = document.getElementById('SINTONIA'); // Captura via ID "SINTONIA"

    if (!grauInput || !vitInput || !sintInput) return;

    const data = {
        grau: grauInput.value,
        vitalidade: vitInput.value,
        sintonia: sintInput.value
    };

    fetch('/api/calculate_resources', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(data)
    })
    .then(r => r.json())
    .then(res => {
        const out = document.getElementById('resourceOutput');
        if (out) out.innerText = `Vida Máxima: ${res.vida} | Conexão Máxima: ${res.conexao}`;
    })
    .catch(err => console.error("Erro ao calcular recursos:", err));
}

function activateTestMode() {
    fetch('/api/test_mode/{{ sheet_type }}')
    .then(r => r.json())
    .then(data => {
        document.getElementById('NOME').value = data.NOME || data.nome || data.v_nome || "";
        document.getElementById('IDADE').value = data.IDADE || data.idade || data.v_idade || 20;
        document.getElementById('GRAU').value = data.GRAU || data.grau || data.v_grau || 1;
        
        const escolhaEscola = data.ESCOLA || data.escola || data.v_escola || "";
        document.getElementById('ESCOLA').value = escolhaEscola;
        document.getElementById('escola_hidden').value = escolhaEscola;
        
        const attrs = data.attributes || data;
        const keys = ['BRUTALIDADE', 'RAPIDEZ', 'VITALIDADE', 'INFLUÊNCIA', 'SINTONIA', 'ASTÚCIA'];
        keys.forEach(k => {
            const el = document.getElementById(k);
            if (el) {
                // Mapeamento compatível para capturar do mock data
                let valor = attrs[k];
                if (valor === undefined && k === 'SINTONIA') {
                    valor = attrs['SINTONIA_ATRIB'] !== undefined ? attrs['SINTONIA_ATRIB'] : attrs['sintonia'];
                }
                if (valor === undefined) valor = attrs[k.toLowerCase()];
                
                el.value = valor !== undefined ? valor : 1;
            }
        });
        
        document.querySelectorAll('input[name="pericias"]').forEach(cb => cb.checked = false);
        
        const listaPericias = data.PERICIAS || data.pericias || [];
        const periciasArray = typeof listaPericias === 'string' ? listaPericias.split(', ') : listaPericias;
        
        const maxPermitido = getPericiasMax();
        let inseridas = 0;

        periciasArray.forEach(p => {
            const nomeLimpo = p.trim();
            let el = document.getElementById('p_' + nomeLimpo) || document.getElementById('p_' + nomeLimpo.toUpperCase()) || document.getElementById('p_' + nomeLimpo.toLowerCase());
            if (el && inseridas < maxPermitido) {
                el.checked = true;
                inseridas++;
            }
        });

        document.getElementById('BACKGROUND').value = data.BACKGROUND || data.background || data.historio || "";
        document.getElementById('INVENTARIO').value = data.INVENTARIO || data.inventario || "";
        document.getElementById('RELIQUIA').value = data.RELIQUIA || data.reliquia || "";
        
        calculateResources();
        updatePericiasCount();
    })
    .catch(err => console.error("Erro ao rodar modo teste de conjurador:", err));
}

document.addEventListener("DOMContentLoaded", function() {
    setTimeout(() => {
        calculateResources();
        updatePericiasCount();
    }, 100);
});
</script>
{% endblock %}
