{% extends 'base.html' %}
{% block content %}
<div class="header">
    <h1>🧙‍♂️ {% if entity %}EDITAR CONJURADOR{% else %}NOVO CONJURADOR{% endif %}</h1>
    <a href="/" style="color: var(--accent2); text-decoration: none; font-size: 13px;">← Voltar ao Menu</a>
</div>

<div style="margin-bottom: 15px;">
    <button type="button" class="btn btn-secondary" onclick="activateTestMode()">🎲 Modo Teste (Preencher Aleatório)</button>
</div>

<form id="sheetForm" action="{% if entity %}/save_and_process/{{ sheet_type }}/{{ entity.id }}{% else %}/save_and_process/{{ sheet_type }}{% endif %}" method="POST">
    
    <input type="hidden" name="action_type" id="action_type" value="pdf">

    <div class="card">
        <h3>IDENTIFICAÇÃO</h3>
        <div class="form-group">
            <label>Nome *</label>
            <input type="text" name="NOME" id="NOME" value="{{ entity.nome if entity else '' }}" required>
        </div>
        <div class="grid-3">
            <div class="form-group">
                <label>Idade *</label>
                <input type="number" name="IDADE" id="IDADE" value="{{ entity.idade if entity else '20' }}" required>
            </div>
            <div class="form-group">
                <label>Grau de Ressonância *</label>
                <input type="number" name="GRAU" id="GRAU" value="{{ entity.grau if entity else '1' }}" required>
            </div>
            <div class="form-group">
                <label>Escola de Combate *</label>
                <select name="ESCOLA" id="ESCOLA" required>
                    <option value="">Selecione...</option>
                    {% for e in constants.ESCOLAS %}
                    <option value="{{ e }}" {% if entity and entity.escola == e %}selected{% endif %}>{{ e }}</option>
                    {% endfor %}
                </select>
            </div>
        </div>
    </div>

    <div class="card">
        <h3>DISTRIBUIÇÃO DE ATRIBUTOS</h3>
        <div class="grid-3">
            <div class="form-group"><label>Brutalidade</label><input type="number" class="attr-input" name="BRUTALIDADE" id="BRUTALIDADE" value="{{ entity.brutalidade if entity else '1' }}" min="0" max="3" onchange="updatePericiasCount()"></div>
            <div class="form-group"><label>Rapidez</label><input type="number" class="attr-input" name="RAPIDEZ" id="RAPIDEZ" value="{{ entity.rapidez if entity else '1' }}" min="0" max="3"></div>
            <div class="form-group"><label>Vitalidade</label><input type="number" class="attr-input" name="VITALIDADE" id="VITALIDADE" value="{{ entity.vitalidade if entity else '1' }}" min="0" max="3" onchange="calculateResources()"></div>
            <div class="form-group"><label>Influência</label><input type="number" class="attr-input" name="INFLUÊNCIA" id="INFLUÊNCIA" value="{{ entity.influencia if entity else '1' }}" min="0" max="3"></div>
            <div class="form-group"><label>Sintonia</label><input type="number" class="attr-input" name="SINTONIA" id="SINTONIA" value="{{ entity.sintonia if entity else '1' }}" min="0" max="3" onchange="calculateResources()"></div>
            <div class="form-group"><label>Astúcia</label><input type="number" class="attr-input" name="ASTÚCIA" id="ASTÚCIA" value="{{ entity.astucia if entity else '1' }}" min="0" max="3" onchange="updatePericiasCount()"></div>
        </div>
        <div style="margin-top: 15px; background: var(--panel); padding: 10px; border-radius: 4px;">
            <button type="button" class="btn btn-secondary" onclick="calculateResources()">⚄ Calcular Recursos</button>
            <span id="resourceOutput" style="font-weight: bold; color: var(--accent); margin-left: 10px;"></span>
        </div>
    </div>

    <div class="card">
        <h3>PERÍCIAS DISPONÍVEIS <span id="periciasCount" style="font-size: 14px; color: var(--accent2); float: right;"></span></h3>
        <div class="checkbox-group">
            {% for p in constants.PERICIAS_DISP %}
            <div class="checkbox-item">
                <input type="checkbox" name="pericias" value="{{ p }}" id="p_{{ p }}" onchange="validatePericiasLimit(this)"
                {% if entity and p in entity.pericias %}checked{% endif %}>
                <label style="margin: 0;" for="p_{{ p }}">{{ p }}</label>
            </div>
            {% endfor %}
        </div>
    </div>

    <div class="card">
        <h3>EXTRAS</h3>
        <div class="form-group"><label>Background / Histórico</label><textarea name="BACKGROUND" id="BACKGROUND" rows="3">{{ entity.historio if entity else '' }}</textarea></div>
        <div class="form-group"><label>Inventário Inicial</label><textarea name="INVENTARIO" id="INVENTARIO" rows="2">{{ entity.inventario if entity else '' }}</textarea></div>
        <div class="form-group"><label>Nome da Relíquia Vinculada</label><input type="text" name="RELIQUIA" id="RELIQUIA" value="{{ entity.reliquia if entity else '' }}"></div>
    </div>

    <div style="display: flex; gap: 10px;">
        <button type="submit" class="btn">📄 Gerar PDF da Conjuração</button>
        <button type="submit" class="btn btn-secondary" onclick="document.getElementById('action_type').value='database'">💾 Salvar no Banco de Dados</button>
    </div>
</form>

<script>
// Calcula dinamicamente o total máximo permitido de perícias
def_pericias_permitidas = 2 + 2; 

function getPericiasMax() {
    const astucia = parseInt(document.getElementById('ASTÚCIA').value) || 0;
    return def_pericias_permitidas + astucia;
}

function updatePericiasCount() {
    const checkboxes = document.querySelectorAll('input[name="pericias"]');
    const selecionadas = Array.from(checkboxes).filter(cb => cb.checked).length;
    const max = getPericiasMax();
    
    const output = document.getElementById('periciasCount');
    output.innerText = `Selecionadas: ${selecionadas} / Máximo Permitido: ${max}`;
    
    if (selecionadas > max) {
        output.style.color = "red";
    } else {
        output.style.color = "var(--accent2)";
    }
}

function validatePericiasLimit(element) {
    const checkboxes = document.querySelectorAll('input[name="pericias"]');
    const selecionadas = Array.from(checkboxes).filter(cb => cb.checked).length;
    const max = getPericiasMax();
    
    if (selecionadas > max) {
        alert(`Limite excedido! O seu Conjurador só pode escolher até ${max} perícias (2 base + 2 escola + ${max - 4} de Astúcia).`);
        element.checked = false;
    }
    updatePericiasCount();
}

function calculateResources() {
    const data = {
        grau: document.getElementById('GRAU').value,
        vitalidade: document.getElementById('VITALIDADE').value,
        sintonia: document.getElementById('SINTONIA').value
    };
    fetch('/api/calculate_resources', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(data)
    })
    .then(r => r.json())
    .then(res => {
        document.getElementById('resourceOutput').innerText = `Vida Máxima: ${res.vida} | Conexão Máxima: ${res.conexao}`;
    });
}

function activateTestMode() {
    fetch('/api/test_mode/{{ sheet_type }}')
    .then(r => r.json())
    .then(data => {
        // Fallbacks inteligentes para dados do Conjurador
        document.getElementById('NOME').value = data.NOME || data.v_nome || "";
        document.getElementById('IDADE').value = data.IDADE || data.v_idade || 20;
        document.getElementById('GRAU').value = data.GRAU || data.v_grau || 1;
        document.getElementById('ESCOLA').value = data.ESCOLA || data.v_escola || "";
        
        // Atributos (seja dentro de um sub-dicionário ou direto)
        const attrs = data.attributes || data;
        const keys = ['BRUTALIDADE', 'RAPIDEZ', 'VITALIDADE', 'INFLUÊNCIA', 'SINTONIA', 'ASTÚCIA'];
        keys.forEach(k => {
            const el = document.getElementById(k);
            if (el) {
                el.value = attrs[k] !== undefined ? attrs[k] : (attrs[k.toLowerCase()] || 1);
            }
        });
        
        // Limpa e seleciona as perícias de teste de forma correta
        document.querySelectorAll('input[name="pericias"]').forEach(cb => cb.checked = false);
        
        const listaPericias = data.PERICIAS || data.pericias || [];
        // Se vier como string do banco de dados, quebra em array
        const periciasArray = typeof listaPericias === 'string' ? listaPericias.split(', ') : listaPericias;
        
        let inseridas = 0;
        const maxPermitido = getPericiasMax();

        periciasArray.forEach(p => {
            // Tenta achar limpando espaços e aceitando variações de caixa alta/baixa
            const nomeLimpo = p.trim();
            let el = document.getElementById('p_' + nomeLimpo) || document.getElementById('p_' + nomeLimpo.toUpperCase());
            if (el && inseridas < maxPermitido) {
                el.checked = true;
                inseridas++;
            }
        });

        document.getElementById('BACKGROUND').value = data.BACKGROUND || data.background || "";
        document.getElementById('INVENTARIO').value = data.INVENTARIO || data.inventario || "";
        document.getElementById('RELIQUIA').value = data.RELIQUIA || data.reliquia || "";
        
        // Atualiza a interface gráfica dos cálculos e contadores
        calculateResources();
        updatePericiasCount();
    })
    .catch(err => console.error("Erro ao rodar modo teste de conjurador:", err));
}

// Executa automaticamente ao abrir a página para iniciar o contador
document.addEventListener("DOMContentLoaded", function() {
    calculateResources();
    updatePericiasCount();
});
</script>
{% endblock %}
