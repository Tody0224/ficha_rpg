{% extends 'base.html' %}
{% block content %}
<div class="header">
    <h1>CONJURADOR</h1>
    <a href="/" style="color: var(--accent2); text-decoration: none; font-size: 13px;">← Voltar ao Menu</a>
</div>

<div style="margin-bottom: 15px;">
    <button type="button" class="btn btn-secondary" onclick="activateTestMode()">🎲 Modo Teste (Preencher Aleatório)</button>
</div>

<form id="sheetForm" action="/generate_pdf/{{ sheet_type }}" method="POST">
    <div class="card">
        <h3>IDENTIFICAÇÃO</h3>
        <div class="form-group">
            <label>Nome *</label>
            <input type="text" name="NOME" id="NOME" required>
        </div>
        <div class="grid-3">
            <div class="form-group">
                <label>Idade *</label>
                <input type="number" name="IDADE" id="IDADE" value="20" required>
            </div>
            <div class="form-group">
                <label>Grau de Ressonância *</label>
                <input type="number" name="GRAU" id="GRAU" value="1" required>
            </div>
            <div class="form-group">
                <label>Escola de Combate *</label>
                <select name="ESCOLA" id="ESCOLA" required>
                    <option value="">Selecione...</option>
                    {% for e in constants.ESCOLAS %}
                    <option value="{{ e }}">{{ e }}</option>
                    {% endfor %}
                </select>
            </div>
        </div>
    </div>

    <div class="card">
        <h3>DISTRIBUIÇÃO DE ATRIBUTOS</h3>
        <div class="grid-3">
            <div class="form-group"><label>Brutalidade</label><input type="number" class="attr-input" name="BRUTALIDADE" id="BRUTALIDADE" value="1" min="0" max="3"></div>
            <div class="form-group"><label>Rapidez</label><input type="number" class="attr-input" name="RAPIDEZ" id="RAPIDEZ" value="1" min="0" max="3"></div>
            <div class="form-group"><label>Vitalidade</label><input type="number" class="attr-input" name="VITALIDADE" id="VITALIDADE" value="1" min="0" max="3"></div>
            <div class="form-group"><label>Influência</label><input type="number" class="attr-input" name="INFLUÊNCIA" id="INFLUÊNCIA" value="1" min="0" max="3"></div>
            <div class="form-group"><label>Sintonia</label><input type="number" class="attr-input" name="SINTONIA" id="SINTONIA" value="1" min="0" max="3"></div>
            <div class="form-group"><label>Astúcia</label><input type="number" class="attr-input" name="ASTÚCIA" id="ASTÚCIA" value="1" min="0" max="3"></div>
        </div>
        <div style="margin-top: 15px; background: var(--panel); padding: 10px; border-radius: 4px;">
            <button type="button" class="btn btn-secondary" onclick="calculateResources()">⚄ Calcular Recursos</button>
            <span id="resourceOutput" style="font-weight: bold; color: var(--accent);"></span>
        </div>
    </div>

    <div class="card">
        <h3>PERÍCIAS DISPONÍVEIS</h3>
        <div class="checkbox-group">
            {% for p in constants.PERICIAS_DISP %}
            <div class="checkbox-item">
                <input type="checkbox" name="pericias" value="{{ p }}" id="p_{{ p }}">
                <label style="margin: 0;" for="p_{{ p }}">{{ p }}</label>
            </div>
            {% endfor %}
        </div>
    </div>

    <div class="card">
        <h3>EXTRAS</h3>
        <div class="form-group"><label>Background / Histórico</label><textarea name="BACKGROUND" id="BACKGROUND" rows="3"></textarea></div>
        <div class="form-group"><label>Inventário Inicial</label><textarea name="INVENTARIO" id="INVENTARIO" rows="2"></textarea></div>
        <div class="form-group"><label>Nome da Relíquia Vinculada</label><input type="text" name="RELIQUIA" id="RELIQUIA"></div>
    </div>

    <button type="submit" class="btn">📄 Gerar PDF</button>
</form>

<script>
function calculateResources() {
    const data = {
        grau: document.getElementById('GRAU').value,
        vitalidade: document.getElementById('VITALIDADE').value,
        sintonia: document.getElementById('SINTONIA').value
    };
    fetch('/api/calculate_resources', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(data)
    })
    .then(r => r.json())
    .then(res => {
        document.getElementById('resourceOutput').innerText = `Vida Máxima: ${res.vida} | Conexão Máxima: ${res.conexao}`;
    });
}

function activateTestMode() {
    fetch('/api/test_mode/{{ sheet_type }}')
    .then(r => r.json())
    .then(data => {
        document.getElementById('NOME').value = data.v_nome;
        document.getElementById('IDADE').value = data.v_idade;
        document.getElementById('GRAU').value = data.v_grau;
        document.getElementById('ESCOLA').value = data.v_escola;
        
        for (const [key, value] of Object.entries(data.attributes)) {
            document.getElementById(key).value = value;
        }
        
        document.querySelectorAll('input[name="pericias"]').forEach(cb => cb.checked = false);
        data.pericias.forEach(p => {
            const el = document.getElementById('p_' + p);
            if (el) el.checked = true;
        });

        document.getElementById('BACKGROUND').value = data.background;
        document.getElementById('INVENTARIO').value = data.inventario;
        calculateResources();
    });
}
</script>
{% endblock %}
