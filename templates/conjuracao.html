{% extends 'base.html' %}
{% block content %}
<div class="header">
    <h1>🔮 {% if entity %}EDITAR CONJURAÇÃO{% else %}NOVA CONJURAÇÃO{% endif %}</h1>
    <a href="/" style="color: var(--accent2); text-decoration: none; font-size: 13px;">← Voltar ao Menu</a>
</div>

<form id="sheetForm" action="{% if entity %}/save_and_process/{{ sheet_type }}/{{ entity.id }}{% else %}/save_and_process/{{ sheet_type }}{% endif %}" method="POST">
    
    <input type="hidden" name="action_type" id="action_type" value="pdf">

    <div class="card">
        <h3>REGISTRO MÍSTICO</h3>
        <div class="form-group">
            <label>Nome da Conjuração *</label>
            <input type="text" name="NOME" id="NOME" value="{{ entity.nome if entity else '' }}" required>
        </div>
        <div class="grid-3" style="grid-template-columns: repeat(2, 1fr);">
            <div class="form-group">
                <label>Matriz Fundamental *</label>
                <select name="MATRIZ" id="MATRIZ" required>
                    <option value="">Selecione...</option>
                    {% for m in ['INCÊNDIO', 'INUNDAÇÃO', 'TEMPESTADE', 'CICLONE', 'TERREMOTO', 'NEUTRO', 'MARCIAL', 'FAUNA', 'FLORA', 'GUARDIÃO', 'FÁBULA', 'SÓLIDO', 'MALEÁVEL', 'ESCURO', 'ESPIRITUAL', 'MENTAL'] %}
                    <option value="{{ m }}" {% if entity and entity.matriz == m %}selected{% endif %}>{{ m }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="form-group">
                <label>Sub-Matriz (Opcional)</label>
                <select name="SUB_MATRIZ" id="SUB_MATRIZ">
                    <option value="">NENHUMA</option>
                    {% for sm in ['ESPIRAL', 'ONDA', 'FÚRIA', 'ESPORO', 'TEMPERATURA'] %}
                    <option value="{{ sm }}" {% if entity and entity.sub_matriz == sm %}selected{% endif %}>{{ sm }}</option>
                    {% endfor %}
                </select>
            </div>
        </div>
    </div>

    <div class="card">
        <h3>CUSTOS E ECONOMIA DE AÇÃO</h3>
        <div class="grid-3">
            <div class="form-group">
                <label>Custo de Conexão *</label>
                <input type="number" name="CUSTO" id="CUSTO" value="{{ entity.custo if entity else 0 }}" min="0" required>
            </div>
            <div class="form-group">
                <label>Ganho de Conexão *</label>
                <input type="number" name="GANHO" id="GANHO" value="{{ entity.ganho_conexao if entity else 0 }}" min="0" required>
            </div>
            <div class="form-group">
                <label>Gasto de Ação *</label>
                <select name="GASTO_ACAO" id="GASTO_ACAO" required>
                    <option value="">Selecione...</option>
                    {% for ac in ['AÇÃO DE LOCOMOÇÃO', 'AÇÃO COMPLEXA', 'AÇÃO EXTRA'] %}
                    <option value="{{ ac }}" {% if entity and entity.gasto_action == ac %}selected{% endif %}>{{ ac }}</option>
                    {% endfor %}
                </select>
            </div>
        </div>
    </div>

    <div class="card">
        <h3>PROPRIEDADES DE APLICAÇÃO</h3>
        <div class="grid-3">
            <div class="form-group">
                <label>Alcance *</label>
                <select name="ALCANCE" id="ALCANCE" required>
                    <option value="">Selecione...</option>
                    {% for al in ['PESSOAL', 'CORPO A CORPO', 'CURTO', 'MÉDIO', 'LONGO', 'EXTREMO'] %}
                    <option value="{{ al }}" {% if entity and entity.alcance == al %}selected{% endif %}>{{ al }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="form-group">
                <label>Área de Efeito *</label>
                <select name="AREA" id="AREA" required>
                    <option value="">Selecione...</option>
                    {% for ar in ['ALVO', 'LINHA', 'CONE', 'CÍRCULO', 'ZONA'] %}
                    <option value="{{ ar }}" {% if entity and entity.area == ar %}selected{% endif %}>{{ ar }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="form-group">
                <label>Dano (Formato XdY ou 0) *</label>
                <input type="text" name="DANO" id="DANO" value="{{ entity.dano if entity else '0' }}" required>
            </div>
        </div>
    </div>

    <div class="card">
        <h3>EFEITOS MECÂNICOS</h3>
        <div class="form-group">
            <label>Lista de Efeitos (Condições, Manobras ou Efeitos Personalizados)</label>
            <textarea name="EFEITOS" id="EFEITOS" rows="3" placeholder="Insira as regras mecânicas...">{{ entity.efeitos if entity else '' }}</textarea>
        </div>
    </div>

    <div class="card">
        <h3>DESCRIÇÃO NARRATIVA</h3>
        <div class="form-group">
            <label>Descrição Visual e Atmosférica *</label>
            <textarea name="DESCRICAO" id="DESCRICAO" rows="4" placeholder="Descreva a manifestação visual..." required>{{ entity.descricao if entity else '' }}</textarea>
        </div>
    </div>

    <div style="display: flex; gap: 10px; margin-top: 20px;">
        <button type="button" class="btn" onclick="submeterFormulario('pdf')">📄 Gerar PDF da Conjuração</button>
        <button type="button" class="btn btn-secondary" onclick="submeterFormulario('database')">💾 Salvar no Banco de Dados</button>
        <button type="button" class="btn btn-secondary" onclick="activateTestMode()">🎲 Modo Teste (Preencher Aleatório)</button>
    </div>
</form>

<script>
function activateTestMode() {
    fetch('/api/test_mode/{{ sheet_type }}')
    .then(r => r.json())
    .then(data => {
        document.getElementById('NOME').value = data.v_nome || data.nome || data.NOME || "Sopro Incendiário";
        document.getElementById('MATRIZ').value = data.v_matriz || data.matriz || data.MATRIZ || "INCÊNDIO";
        
        let subMatriz = data.v_sub_matriz || data.sub_matriz || data.SUB_MATRIZ || "";
        document.getElementById('SUB_MATRIZ').value = subMatriz === "NENHUMA" ? "" : subMatriz;
        
        document.getElementById('CUSTO').value = data.v_custo !== undefined ? data.v_custo : (data.custo !== undefined ? data.custo : (data.CUSTO || 0));
        
        // Corrigido para buscar o novo ID 'GANHO' mapeado corretamente
        document.getElementById('GANHO').value = data.v_ganho_conexao !== undefined ? data.v_ganho_conexao : (data.ganho_conexao !== undefined ? data.ganho_conexao : (data.GANHO || 0));
        
        document.getElementById('GASTO_ACAO').value = data.v_gasto_acao || data.gasto_action || data.GASTO_ACAO || "AÇÃO COMPLEXA";
        document.getElementById('ALCANCE').value = data.v_alcance || data.alcance || data.ALCANCE || "CURTO";
        document.getElementById('AREA').value = data.v_area || data.area || data.AREA || "ALVO";
        document.getElementById('DANO').value = data.v_dano || data.dano || data.DANO || "2d6";
        
        document.getElementById('EFEITOS').value = data.ta_efeitos || data.efeitos || data.EFEITOS || "Aplica condição Queimando.";
        document.getElementById('DESCRICAO').value = data.ta_descricao || data.descricao || data.DESCRICAO || "Uma onda avassaladora de calor irrompe das mãos do conjurador.";
        
        salvarProgressoLocal();
    })
    .catch(err => {
        console.error("Erro ao rodar modo teste de conjuração:", err);
    });
}

// ─────────────────────────────────────────────────────────
// CONTROLE DE SUBMISSÃO SEGURO (VERIFICA LOGIN ANTES)
// ─────────────────────────────────────────────────────────
function submeterFormulario(tipoAcao) {
    const formElement = document.getElementById('sheetForm');
    
    if (!formElement.checkValidity()) {
        formElement.reportValidity();
        return;
    }

    document.getElementById('action_type').value = tipoAcao;

    if (tipoAcao === 'database') {
        fetch('/api/active_users')
            .then(res => {
                if (res.redirected || res.status === 401) {
                     soliciarLoginFicha();
                } else {
                    formElement.submit();
                }
            })
            .catch(() => {
                soliciarLoginFicha();
            });
    } else {
        formElement.submit();
    }
}

function soliciarLoginFicha() {
    alert("Sua sessão expirou ou você está no modo visitante! Para salvar no Banco de Dados, você será levado à tela de login. Não se preocupe, seus dados atuais foram guardados como rascunho automaticamente.");
    window.location.href = "/login?next=" + encodeURIComponent(window.location.pathname);
}

// ─────────────────────────────────────────────────────────
// SISTEMA GENÉRICO DE SALVAMENTO AUTOMÁTICO DE RASCUNHOS
// ─────────────────────────────────────────────────────────
const storageKey = "rascunho_ficha_" + window.location.pathname;
const form = document.getElementById('sheetForm');

function salvarProgressoLocal() {
    const dados = {};
    const inputs = form.querySelectorAll('input, select, textarea');
    
    inputs.forEach(el => {
        if (!el.name || el.type === 'hidden') return;
        
        if (el.type === 'checkbox') {
            if (!dados[el.name]) dados[el.name] = [];
            if (el.checked) dados[el.name].push(el.value);
        } else {
            dados[el.name] = el.value;
        }
    });
    localStorage.setItem(storageKey, JSON.stringify(dados));
}

function restaurarProgressoLocal() {
    const salvo = localStorage.getItem(storageKey);
    if (!salvo) return;
    
    try {
        const dados = JSON.parse(salvo);
        Object.keys(dados).forEach(key => {
            const campos = form.querySelectorAll(`[name="${key}"]`);
            if (campos.length === 0) return;
            
            if (campos[0].type === 'checkbox') {
                campos.forEach(cb => {
                    cb.checked = dados[key].includes(cb.value);
                });
            } else {
                campos[0].value = dados[key];
            }
        });
    } catch (e) {
        console.error("Erro ao ler rascunho local:", e);
    }
}

form.addEventListener('input', salvarProgressoLocal);
form.addEventListener('change', salvarProgressoLocal);

form.addEventListener('submit', function() {
    setTimeout(() => { localStorage.removeItem(storageKey); }, 500);
});

document.addEventListener("DOMContentLoaded", function() {
    restaurarProgressoLocal();
});
</script>
{% endblock %}
