{% extends 'base.html' %}
{% block content %}
<div style="max-width: 400px; margin: 80px auto; padding: 0 15px;">
    <div class="card" style="border-top: 4px solid var(--accent2);">
        <h3 style="text-align: center; margin-bottom: 20px;">📜 REGISTRAR NOVO CONJURADOR</h3>
        
        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            {% for category, message in messages %}
              <div style="background: rgba({% if category=='success' %}85, 255, 85, 0.1{% else %}255, 85, 85, 0.1{% endif %}); color: {% if category=='success' %}#55ff55{% else %}#ff5555{% endif %}; padding: 10px; border-radius: 4px; margin-bottom: 15px; font-size: 13px; border-left: 3px solid {% if category=='success' %}#55ff55{% else %}#ff5555{% endif %};">
                {{ message }}
              </div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <form method="POST" action="/register">
            <div class="form-group">
                <label>Escolha seu Nome de Usuário</label>
                <input type="text" name="username" placeholder="Ex: Merlin123" required autocomplete="username">
            </div>
            <div class="form-group" style="margin-top: 15px;">
                <label>Defina uma Senha</label>
                <input type="password" name="password" placeholder="Mínimo de 6 dígitos..." required autocomplete="new-password">
            </div>
            <button type="submit" class="btn btn-secondary" style="width: 100%; margin-top: 20px; font-weight: bold; background: var(--accent2); color: #000;">✨ Criar Conta</button>
        </form>
        
        <div style="margin-top: 20px; text-align: center; font-size: 13px; border-top: 1px solid var(--panel); padding-top: 15px;">
            Já possui uma conta? <a href="/login" style="color: var(--accent); text-decoration: none; font-weight: bold;">Fazer Login</a>
        </div>
    </div>
</div>
{% endblock %}
