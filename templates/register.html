{% extends 'base.html' %}
{% block content %}
<div class="auth-page">
    <div class="card auth-card-accent2 fade-in">
        <h3 class="auth-card-title">📜 REGISTRAR NOVO USUÁRIO</h3>
        
        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            {% for category, message in messages %}
              <div class="flash-msg {% if category == 'success' %}flash-success{% else %}flash-error{% endif %}">
                {{ message }}
              </div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <form method="POST" action="/register">
            <div class="form-group">
                <label>Escolha seu Nome de Usuário</label>
                <input type="text" name="username" placeholder="Ex: Merlin123" required autocomplete="username">
            </div>
            <div class="form-group auth-form-group-spaced">
                <label>Defina uma Senha</label>
                <input type="password" name="password" placeholder="Mínimo de 6 dígitos..." required autocomplete="new-password">
            </div>
            <button type="submit" class="btn btn-secondary auth-submit-btn accent2">✨ Criar Conta</button>
        </form>
        
        <div class="auth-footer">
            Já possui uma conta? <a href="/login">Fazer Login</a>
        </div>
    </div>
</div>
{% endblock %}
