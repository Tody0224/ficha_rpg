{% extends 'base.html' %}
{% block content %}
<div class="header">
    <h1>🐾 {% if entity %}EDITAR FAMILIAR{% else %}NOVO FAMILIAR{% endif %}</h1>
    <a href="/" class="link-voltar">← Voltar ao Menu</a>
</div>

<form id="sheetForm" action="{% if entity %}/save_and_process/{{ sheet_type }}/{{ entity.id }}{% else %}/save_and_process/{{ sheet_type }}{% endif %}" method="POST">
    
    <input type="hidden" name="action_type" id="action_type" value="pdf">

    <div class="card">
        <h3>IDENTIFICAÇÃO DA CRIATURA</h3>
        <div class="form-group">
            <label>Nome do Familiar *</label>
            <input type="text" name="NOME" id="NOME" value="{{ entity.nome if entity else '' }}" required>
        </div>
        <div class="grid-2">
            <div class="form-group">
                <label>Espécie Base *</label>
                <input type="text" name="ESPECIE" id="ESPECIE" placeholder="Ex: Lobo, Corvo, Serpente" value="{{ entity.especie if entity else (entity.ESPECIE if entity else '') }}" required>
            </div>
            <div class="form-group">
                <label>Nível de Ameaça *</label>
                <input type="number" name="AMEACA" id="AMEACA" value="{{ entity.ameaca if entity else '1' }}" min="1" max="10" required>
            </div>
        </div>
        <div class="grid-2">
            <div class="form-group">
                <label>Porte *</label>
                <select name="PORTE" id="PORTE" required>
                    <option value="">Selecione...</option>
                    {% for p in constants.PORTES %}
                    <option value="{{ p }}" {% if entity and entity.porte == p %}selected{% endif %}>{{ p }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="form-group">
                <label>Bioma Nativo *</label>
                <input type="text" name="BIOMA" id="BIOMA" placeholder="Ex: Floresta, Cavernas" value="{{ entity.bioma if entity else '' }}" required>
            </div>
        </div>
    </div>

    <div class="card">
        <h3>AFINIDADE ELEMENTAL & CARACTERÍSTICAS</h3>
        <div class="grid-2">
            <div class="form-group">
                <label>Matriz Fundamental *</label>
                <select name="MATRIZ" id="MATRIZ" required>
                    <option value="">Selecione...</option>
                    {% for m in constants.MATRIZES %}
                    <option value="{{ m }}" {% if entity and entity.matriz == m %}selected{% endif %}>{{ m }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="form-group">
                <label>Sub-Matriz</label>
                <select name="SUB_MATRIZ" id="SUB_MATRIZ">
                    <option value="">NENHUMA</option>
                    {% for s in constants.SUB_MATRIZES %}
                    {% if s != "NENHUMA" %}
                    <option value="{{ s }}" {% if entity and entity.sub_matriz == s %}selected{% endif %}>{{ s }}</option>
                    {% endif %}
                    {% endfor %}
                </select>
            </div>
        </div>
        <div class="grid-3">
            <div class="form-group">
                <label>Cobertura *</label>
                <select name="COBERTURA" id="COBERTURA" required>
                    <option value="">Selecione...</option>
                    {% for c in constants.COBERTURAS %}
                    <option value="{{ c }}" {% if entity and entity.cobertura == c %}selected{% endif %}>{{ c }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="form-group">
                <label>Coloração *</label>
                <input type="text" name="COLORACAO" id="COLORACAO" value="{{ entity.coloracao if entity else '' }}" required>
            </div>
            <div class="form-group">
                <label>Temperamento *</label>
                <select name="TEMPERAMENTO" id="TEMPERAMENTO" required>
                    <option value="">Selecione...</option>
                    {% for t in constants.TEMPERAMENTOS %}
                    <option value="{{ t }}" {% if entity and entity.temperamento == t %}selected{% endif %}>{{ t }}</option>
                    {% endfor %}
                </select>
            </div>
        </div>
        <div class="grid-2">
            <div class="form-group">
                <label>Hábito Biológico *</label>
                <select name="HABITO" id="HABITO" required>
                    <option value="">Selecione...</option>
                    {% for h in constants.HABITOS %}
                    <option value="{{ h }}" {% if entity and entity.habito == h %}selected{% endif %}>{{ h }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="form-group">
                <label>Socialização *</label>
                <select name="SOCIALIZACAO" id="SOCIALIZACAO" required>
                    <option value="">Selecione...</option>
                    {% for soc in constants.SOCIALIZACOES %}
                    <option value="{{ soc }}" {% if entity and entity.socializacao == soc %}selected{% endif %}>{{ soc }}</option>
                    {% endfor %}
                </select>
            </div>
        </div>
    </div>

    <div class="card">
        <h3>HABILIDADES E CAPACIDADES</h3>
        <div class="form-group">
            <label>Habilidades Físicas / Traços Biológicos</label>
            <textarea name="HAB_FISICAS" id="HAB_FISICAS" rows="2" placeholder="Garras afiadas, camuflagem, voo...">{{ entity.hab_fisicas if entity else '' }}</textarea>
        </div>
        <div class="form-group">
            <label>Poderes da Matriz / Manifestações Sobrenaturais</label>
            <textarea name="HAB_MATRIZ" id="HAB_MATRIZ" rows="2" placeholder="Explosões elementais, emanação de calor, telepatia elemental...">{{ entity.hab_matriz if entity else '' }}</textarea>
        </div>
    </div>

    <div class="card">
        <h3>DESCRIÇÃO GERAL</h3>
        <div class="form-group">
            <label>Descrição Biológica, Aparência e Histórico Narrativo</label>
            <textarea name="DESCRICAO" id="DESCRICAO" rows="4" placeholder="Escreva aqui sobre o comportamento habitual, detalhes visuais marcantes e como este familiar interage com o ambiente e seu mestre...">{{ entity.descricao if entity else '' }}</textarea>
        </div>
    </div>

    <div class="form-actions-group">
        <button type="button" class="btn" onclick="submeterFormulario('pdf')">Gerar PDF Familiar</button>
        <button type="button" class="btn btn-secondary" onclick="submeterFormulario('database')">Salvar no Banco de Dados</button>
        <button type="button" class="btn btn-secondary" onclick="activateTestMode()">Preencher Aleatório</button>
    </div>
</form>

<script>
function activateTestMode() {
    fetch('/api/test_mode/{{ sheet_type }}')
    .then(r => r.json())
    .then(data => {
        document.getElementById('NOME').value = data.NOME || data.nome || data.v_nome || "";
        document.getElementById('ESPECIE').value = data.ESPECIE || data.especie || data.v_especie || "";
        document.getElementById('AMEACA').value = data.AMEACA || data.ameaca || data.v_ameaca || 1;
        document.getElementById('PORTE').value = data.PORTE || data.porte || data.v_porte || "";
        document.getElementById('BIOMA').value = data.BIOMA || data.bioma || data.v_bioma || "";
        document.getElementById('MATRIZ').value = data.MATRIZ || data.matriz || data.v_matriz || "";
        document.getElementById('SUB_MATRIZ').value = data.SUB_MATRIZ || data.sub_matriz || data.v_sub || "NENHUMA";
        document.getElementById('COBERTURA').value = data.COBERTURA || data.cobertura || data.v_cobertura || "";
        document.getElementById('COLORACAO').value = data.COLORACAO || data.coloracao || data.v_coloracao || "";
        document.getElementById('TEMPERAMENTO').value = data.TEMPERAMENTO || data.temperamento || data.v_temp || "";
        document.getElementById('HABITO').value = data.HABITO || data.habito || data.v_habito || "";
        document.getElementById('SOCIALIZACAO').value = data.SOCIALIZACAO || data.socializacao || data.v_social || "";
        
        document.getElementById('HAB_FISICAS').value = data.HAB_FISICAS || data.hab_fisicas || data.ta_fisicas || "";
        document.getElementById('HAB_MATRIZ').value = data.HAB_MATRIZ || data.hab_matriz || data.ta_matriz || "";
        
        const temp = (data.TEMPERAMENTO || data.v_temp || "").toLowerCase();
        const habito = (data.HABITO || data.v_habito || "").toLowerCase();
        document.getElementById('DESCRICAO').value = data.DESCRICAO || data.descricao || `Familiar gerado em modo teste com comportamento ${temp} e hábitos ${habito}.`;
        
        salvarProgressoLocal();
    })
    .catch(err => console.error("Erro ao rodar modo teste de familiar:", err));
}

// ─────────────────────────────────────────────────────────
// CONTROLE DE SUBMISSÃO SEGURO (VERIFICA LOGIN ANTES)
// ─────────────────────────────────────────────────────────
function submeterFormulario(tipoAcao) {
    const formElement = document.getElementById('sheetForm');
    
    if (!formElement.checkValidity()) {
        formElement.reportValidity();
        return;
    }

    document.getElementById('action_type').value = tipoAcao;

    if (tipoAcao === 'database') {
        fetch('/api/active_users')
            .then(res => {
                if (res.redirected || res.status === 401) {
                     soliciarLoginFicha();
                } else {
                    formElement.submit();
                }
            })
            .catch(() => {
                soliciarLoginFicha();
            });
    } else {
        formElement.submit();
    }
}

function soliciarLoginFicha() {
    alert("Sua sessão expirou ou você está no modo visitante! Para salvar no Banco de Dados, você será levado à tela de login. Não se preocupe, seus dados atuais foram guardados como rascunho automaticamente.");
    window.location.href = "/login?next=" + encodeURIComponent(window.location.pathname);
}

// ─────────────────────────────────────────────────────────
// SISTEMA GENÉRICO DE SALVAMENTO AUTOMÁTICO DE RASCUNHOS
// ─────────────────────────────────────────────────────────
const storageKey = "rascunho_ficha_" + window.location.pathname;
const form = document.getElementById('sheetForm');

function salvarProgressoLocal() {
    const dados = {};
    const inputs = form.querySelectorAll('input, select, textarea');
    
    inputs.forEach(el => {
        if (!el.name || el.type === 'hidden') return;
        
        if (el.type === 'checkbox') {
            if (!dados[el.name]) dados[el.name] = [];
            if (el.checked) dados[el.name].push(el.value);
        } else {
            dados[el.name] = el.value;
        }
    });
    localStorage.setItem(storageKey, JSON.stringify(dados));
}

function restaurarProgressoLocal() {
    const salvo = localStorage.getItem(storageKey);
    if (!saved) return; // Fallback simples se estiver vazio
    
    try {
        const dados = JSON.parse(salvo);
        Object.keys(dados).forEach(key => {
            const campos = form.querySelectorAll(`[name="${key}"]`);
            if (campos.length === 0) return;
            
            if (campos[0].type === 'checkbox') {
                campos.forEach(cb => {
                    cb.checked = dados[key].includes(cb.value);
                });
            } else {
                campos[0].value = dados[key];
            }
        });
    } catch (e) {
        console.error("Erro ao ler rascunho local:", e);
    }
}

form.addEventListener('input', salvarProgressoLocal);
form.addEventListener('change', salvarProgressoLocal);

form.addEventListener('submit', function() {
    setTimeout(() => { localStorage.removeItem(storageKey); }, 500);
});

document.addEventListener("DOMContentLoaded", function() {
    // Tenta restaurar rascunhos salvos, caso existam
    const salvo = localStorage.getItem(storageKey);
    if (salvo) restaurarProgressoLocal();
});
</script>
{% endblock %}
