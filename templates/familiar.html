{% extends 'base.html' %}
{% block content %}
<div class="header">
    <h1>🐾 FAMILIAR</h1>
    <a href="/" style="color: var(--accent2); text-decoration: none; font-size: 13px;">← Voltar ao Menu</a>
</div>

<div style="margin-bottom: 15px;">
    <button type="button" class="btn btn-secondary" onclick="activateTestMode()">🎲 Modo Teste (Preencher Aleatório)</button>
</div>

<form id="sheetForm" action="/generate_pdf/{{ sheet_type }}" method="POST">
    <div class="card">
        <h3>IDENTIFICAÇÃO DA CRIATURA</h3>
        <div class="form-group">
            <label>Nome do Familiar *</label>
            <input type="text" name="NOME" id="NOME" required>
        </div>
        <div class="grid-3" style="grid-template-columns: repeat(2, 1fr);">
            <div class="form-group">
                <label>Espécie Base *</label>
                <input type="text" name="ESPECIE" id="ESPECIE" placeholder="Ex: Lobo, Corvo, Serpente" required>
            </div>
            <div class="form-group">
                <label>Nível de Ameaça *</label>
                <input type="number" name="AMEACA" id="AMEACA" value="1" min="1" max="10" required>
            </div>
        </div>
        <div class="grid-3" style="grid-template-columns: repeat(2, 1fr);">
            <div class="form-group">
                <label>Porte *</label>
                <select name="PORTE" id="PORTE" required>
                    <option value="">Selecione...</option>
                    {% for p in constants.PORTES %}
                    <option value="{{ p }}">{{ p }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="form-group">
                <label>Bioma Nativo *</label>
                <input type="text" name="BIOMA" id="BIOMA" placeholder="Ex: Floresta, Cavernas" required>
            </div>
        </div>
    </div>

    <div class="card">
        <h3>AFINIDADE ELEMENTAL & CARACTERÍSTICAS</h3>
        <div class="grid-3" style="grid-template-columns: repeat(2, 1fr);">
            <div class="form-group">
                <label>Matriz Fundamental *</label>
                <select name="MATRIZ" id="MATRIZ" required>
                    <option value="">Selecione...</option>
                    {% for m in constants.MATRIZES %}
                    <option value="{{ m }}">{{ m }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="form-group">
                <label>Sub-Matriz</label>
                <select name="SUB_MATRIZ" id="SUB_MATRIZ">
                    <option value="">NENHUMA</option>
                    {% for s in constants.SUB_MATRIZES %}
                    {% if s != "NENHUMA" %}
                    <option value="{{ s }}">{{ s }}</option>
                    {% endif %}
                    {% endfor %}
                </select>
            </div>
        </div>
        <div class="grid-3">
            <div class="form-group">
                <label>Cobertura *</label>
                <select name="COBERTURA" id="COBERTURA" required>
                    <option value="">Selecione...</option>
                    {% for c in constants.COBERTURAS %}
                    <option value="{{ c }}">{{ c }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="form-group">
                <label>Coloração *</label>
                <input type="text" name="COLORACAO" id="COLORACAO" required>
            </div>
            <div class="form-group">
                <label>Temperamento *</label>
                <select name="TEMPERAMENTO" id="TEMPERAMENTO" required>
                    <option value="">Selecione...</option>
                    {% for t in constants.TEMPERAMENTOS %}
                    <option value="{{ t }}">{{ t }}</option>
                    {% endfor %}
                </select>
            </div>
        </div>
        <div class="grid-3" style="grid-template-columns: repeat(2, 1fr);">
            <div class="form-group">
                <label>Hábito Biológico *</label>
                <select name="HABITO" id="HABITO" required>
                    <option value="">Selecione...</option>
                    {% for h in constants.HABITOS %}
                    <option value="{{ h }}">{{ h }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="form-group">
                <label>Socialização *</label>
                <select name="SOCIALIZACAO" id="SOCIALIZACAO" required>
                    <option value="">Selecione...</option>
                    {% for soc in constants.SOCIALIZACOES %}
                    <option value="{{ soc }}">{{ soc }}</option>
                    {% endfor %}
                </select>
            </div>
        </div>
    </div>

    <div class="card">
        <h3>HABILIDADES E CAPACIDADES</h3>
        <div class="form-group">
            <label>Habilidades Físicas / Traços Biológicos</label>
            <textarea name="HAB_FISICAS" id="HAB_FISICAS" rows="2" placeholder="Garras afiadas, camuflagem, voo..."></textarea>
        </div>
        <div class="form-group">
            <label>Poderes da Matriz / Manifestações Sobrenaturais</label>
            <textarea name="HAB_MATRIZ" id="HAB_MATRIZ" rows="2" placeholder="Explosões elementais, emanação de calor, telepatia elemental..."></textarea>
        </div>
    </div>

    <div class="card">
        <h3>DESCRIÇÃO GERAL</h3>
        <div class="form-group">
            <label>Descrição Biológica, Aparência e Histórico Narrativo</label>
            <textarea name="DESCRICAO" id="DESCRICAO" rows="4" placeholder="Escreva aqui sobre o comportamento habitual, detalhes visuais marcantes e como este familiar interage com o ambiente e seu mestre..."></textarea>
        </div>
    </div>

    <button type="submit" class="btn">📄 Gerar PDF do Familiar</button>
</form>

<script>
function activateTestMode() {
    fetch('/api/test_mode/{{ sheet_type }}')
    .then(r => r.json())
    .then(data => {
        // Vincula as chaves aleatórias do back-end aos respectivos seletores
        document.getElementById('NOME').value = data.v_nome;
        document.getElementById('ESPECIE').value = data.v_especie;
        document.getElementById('AMEACA').value = data.v_ameaca;
        document.getElementById('PORTE').value = data.v_porte;
        document.getElementById('BIOMA').value = data.v_bioma;
        document.getElementById('MATRIZ').value = data.v_matriz;
        document.getElementById('SUB_MATRIZ').value = data.v_sub || "";
        document.getElementById('COBERTURA').value = data.v_cobertura;
        document.getElementById('COLORACAO').value = data.v_coloracao;
        document.getElementById('TEMPERAMENTO').value = data.v_temp;
        document.getElementById('HABITO').value = data.v_habito;
        document.getElementById('SOCIALIZACAO').value = data.v_social;
        
        // Alimenta as caixas de texto longas unificadas
        document.getElementById('HAB_FISICAS').value = data.ta_fisicas;
        document.getElementById('HAB_MATRIZ').value = data.ta_matriz;
        document.getElementById('DESCRICAO').value = "Familiar gerado em modo teste com comportamento " + data.v_temp.toLowerCase() + " e hábitos " + data.v_habito.toLowerCase() + ".";
    })
    .catch(err => console.error("Erro ao rodar modo teste de familiar:", err));
}
</script>
{% endblock %}
