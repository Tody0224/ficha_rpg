{% extends 'base.html' %}
{% block content %}
<div class="auth-page">
    <div class="card auth-card-accent fade-in">
        <h3 class="auth-card-title">LOGIN CONJURADORES</h3>
        
        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            {% for category, message in messages %}
              <div class="flash-msg flash-banner-login">
                {{ message }}
              </div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <form method="POST" action="{{ url_for('auth.login') }}">
            <div class="form-group">
                <label>Nome de Usuário</label>
                <input type="text" name="username" placeholder="Seu nome místico..." required autocomplete="username">
            </div>
            <div class="form-group auth-form-group-spaced">
                <label>Senha</label>
                <input type="password" name="password" placeholder="Sua senha secreta..." required autocomplete="current-password">
            </div>
            <button type="submit" class="btn auth-submit-btn">ENTRAR</button>
            <div class="auth-footer">
                <span class="muted-text">Novo por aqui? </span>
                <a href="{{ url_for('auth.register') }}">Registrar Usuário</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
