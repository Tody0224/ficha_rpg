{% extends 'base.html' %}
{% block content %}
<div class="header">
    <h1>💎 RELÍQUIA</h1>
    <a href="/" style="color: var(--accent2); text-decoration: none; font-size: 13px;">← Voltar ao Menu</a>
</div>

<div style="margin-bottom: 15px;">
    <button type="button" class="btn btn-secondary" onclick="activateTestMode()">🎲 Modo Teste (Preencher Aleatório)</button>
</div>

<form id="sheetForm" action="/generate_pdf/{{ sheet_type }}" method="POST">
    <div class="card">
        <h3>IDENTIFICAÇÃO DO ARTEFATO</h3>
        <div class="form-group">
            <label>Nome da Relíquia *</label>
            <input type="text" name="NOME" id="NOME" required>
        </div>
        <div class="grid-3" style="grid-template-columns: repeat(2, 1fr);">
            <div class="form-group">
                <label>Nível da Relíquia *</label>
                <select name="NIVEL" id="NIVEL" required>
                    <option value="">Selecione...</option>
                    {% for n in constants.NIVEIS_REL %}
                    <option value="{{ n }}">{{ n }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="form-group">
                <label>Núcleo da Relíquia *</label>
                <select name="NUCLEO" id="NUCLEO" required>
                    <option value="">Selecione...</option>
                    {% for nu in constants.NUCLEOS_REL %}
                    <option value="{{ nu }}">{{ nu }}</option>
                    {% endfor %}
                </select>
            </div>
        </div>
    </div>

    <div class="card">
        <h3>VÍNCULOS ELEMENTAIS</h3>
        <div class="grid-3" style="grid-template-columns: repeat(2, 1fr);">
            <div class="form-group">
                <label>Matriz Fundamental *</label>
                <select name="MATRIZ" id="MATRIZ" required>
                    <option value="">Selecione...</option>
                    {% for m in constants.MATRIZES %}
                    <option value="{{ m }}">{{ m }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="form-group">
                <label>Sub-Matriz</label>
                <select name="SUB_MATRIZ" id="SUB_MATRIZ">
                    <option value="">NENHUMA</option>
                    {% for s in constants.SUB_MATRIZES %}
                    {% if s != "NENHUMA" %}
                    <option value="{{ s }}">{{ s }}</option>
                    {% endif %}
                    {% endfor %}
                </select>
            </div>
        </div>
    </div>

    <div class="card">
        <h3>PROPRIEDADES DE COMBATE</h3>
        <div class="grid-3" style="grid-template-columns: repeat(2, 1fr);">
            <div class="form-group">
                <label>Alcance Base *</label>
                <select name="ALCANCE" id="ALCANCE" required>
                    <option value="">Selecione...</option>
                    {% for a in constants.ALCANCES %}
                    <option value="{{ a }}">{{ a }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="form-group">
                <label>Dano Próprio (Ex: 1d6, 1d8, —)</label>
                <input type="text" name="DANO" id="DANO" placeholder="—">
            </div>
        </div>
        <div class="form-group" style="margin-top: 10px;">
            <label>Familiar Vinculado (Se aplicável)</label>
            <input type="text" name="FAMILIAR" id="FAMILIAR" placeholder="Nome do Familiar vinculado a este artefato">
        </div>
    </div>

    <div class="card">
        <h3>DETALHAMENTO</h3>
        <div class="form-group">
            <label>Conjurações Gravadas / Matrizes Injetadas</label>
            <textarea name="CONJURACOES" id="CONJURACOES" rows="3" placeholder="Liste as conjurações ou rituais fixados na relíquia..."></textarea>
        </div>
        <div class="form-group">
            <label>Descrição Física e Histórico</label>
            <textarea name="DESCRICAO" id="DESCRICAO" rows="3" placeholder="Aparência, material de origem, lendas ou propriedades narrativas..."></textarea>
        </div>
    </div>

    <button type="submit" class="btn">📄 Gerar PDF da Relíquia</button>
</form>

<script>
function activateTestMode() {
    fetch('/api/test_mode/{{ sheet_type }}')
    .then(r => r.json())
    .then(data => {
        // Alimenta os inputs normais e seletores com base nas chaves geradas pelo back-end
        document.getElementById('NOME').value = data.v_nome;
        document.getElementById('NIVEL').value = data.v_nivel;
        document.getElementById('NUCLEO').value = data.v_nucleo;
        document.getElementById('MATRIZ').value = data.v_matriz;
        document.getElementById('SUB_MATRIZ').value = data.v_sub || "";
        document.getElementById('ALCANCE').value = data.v_alcance;
        document.getElementById('DANO').value = data.v_dano;
        document.getElementById('FAMILIAR').value = data.v_familiar || "";
        
        // Alimenta as caixas de texto longas
        document.getElementById('CONJURACOES').value = data.ta_conjuracoes;
        document.getElementById('DESCRICAO').value = data.ta_desc;
    })
    .catch(err => console.error("Erro ao rodar modo teste de relíquia:", err));
}
</script>
{% endblock %}
