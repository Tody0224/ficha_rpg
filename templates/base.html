<!DOCTYPE html>
<html lang="pt-br">
    <head>
        <meta charset="UTF-8">
        <title>✦ Gerador de Fichas RPG</title>
        <style>
            :root {
                --bg: #0F1923; --panel: #1A2A38; --card: #1F3347;
                --accent: #C8973A; --accent2: #3A7CA5; --text: #E8DCC8;
                --muted: #7A8FA0; --border: #2D4A62;
            }
            body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; }
            .container { max-width: 800px; margin: 0 auto; }
            .header { border-bottom: 1px solid var(--border); padding-bottom: 10px; margin-bottom: 20px; }
            .header h1 { color: var(--accent); font-family: 'Georgia', serif; margin: 0; }
            .card { background: var(--card); border: 1px solid var(--border); border-top: 3px solid var(--accent); padding: 20px; margin-bottom: 15px; border-radius: 4px; }
            .form-group { margin-bottom: 15px; display: flex; flex-direction: column; }
            label { font-weight: bold; margin-bottom: 5px; color: var(--muted); font-size: 14px;}
            input, select, textarea { background: var(--panel); color: var(--text); border: 1px solid var(--border); padding: 8px; border-radius: 4px; font-size: 14px; }
            input:focus, select:focus, textarea:focus { border-color: var(--accent); outline: none; }
            .btn { background: var(--accent); color: var(--bg); font-weight: bold; border: none; padding: 10px 20px; cursor: pointer; border-radius: 4px; font-size: 14px; }
            .btn:hover { background: var(--accent2); color: var(--text); }
            .btn-secondary { background: var(--panel); color: var(--muted); border: 1px solid var(--border); margin-right: 10px;}
            .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; }
            .checkbox-group { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
            .checkbox-item { display: flex; align-items: center; font-size: 13px; }
            .checkbox-item input { margin-right: 8px; }
        </style>
    </head>
    <body>
        <div class="container">
            {% block content %}{% endblock %}
        </div>
    </body>
</html>
