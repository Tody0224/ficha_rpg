<!DOCTYPE html>
<html lang="pt-br">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>CONJURADORES</title>
        <link rel="shortcut icon" href="{{ url_for('static', filename='logo_conjuradores.png') }}" type="image/x-icon">
        <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    </head>
    <body>

        <nav class="main-navbar">
            <div class="nav-container">
                <a href="/" class="nav-logo-link">
                    <img src="{{ url_for('static', filename='logo_conjuradores.png') }}" alt="Logo Conjuradores" class="nav-logo">
                </a>
                
                <div class="nav-right-side">
                    <div class="nav-status-info">
                        {% if current_user.is_authenticated %}
                            <p class="nav-user-label">CONJURADOR: <strong>{{ current_user.username }}</strong></p>
                        {% else %}
                            <p class="nav-user-label visitor">Modo Visitante</p>
                        {% endif %}
                        <span class="nav-online-count">🟢 ONLINE: <span id="user-count">0</span></span>
                    </div>

                    <div class="nav-auth-actions">
                        {% if current_user.is_authenticated %}
                            <a href="{{ url_for('auth.logout') }}" class="btn-nav btn-nav-danger">Sair</a>
                        {% else %}
                            <a href="{{ url_for('auth.login') }}" class="btn-nav btn-nav-primary">Entrar</a>
                            <a href="{{ url_for('auth.register') }}" class="btn-nav btn-nav-secondary">Registrar</a>
                        {% endif %}
                    </div>
                </div>
            </div>
        </nav>

        <div class="container fade-in">
            {% block content %}{% endblock %}
        </div>

        <script>
            function updateOnlineUsers() {
                fetch('/api/active_users')
                    .then(res => res.json())
                    .then(data => {
                        const countEl = document.getElementById('user-count');
                        if (countEl) countEl.innerText = data.count;
                    })
                    .catch(err => console.error("Erro ao carregar rede de magos:", err));
            }
            setInterval(updateOnlineUsers, 30000);
            updateOnlineUsers();
        </script>
    </body>
</html>
